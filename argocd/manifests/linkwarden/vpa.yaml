apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: linkwarden
  namespace: linkwarden
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: linkwarden
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: linkwarden
      minAllowed:
        memory: 500Mi
      maxAllowed:
        memory: 2Gi
