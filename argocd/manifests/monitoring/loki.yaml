apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.53.0
    helm:
      valuesObject:
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        loki:
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          pattern_ingester:
              enabled: true
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
            retention_period: 24h
          compactor:
            retention_enabled: true
            delete_request_store: filesystem
          ruler:
            enable_api: true
        minio:
          enabled: false

        deploymentMode: SingleBinary

        singleBinary:
          replicas: 1
          annotations:
            argocd.argoproj.io/sync-options: ServerSideApply=true
          initContainers:
            - name: clear-oversized-wal-once
              image: docker.io/library/busybox:1.37.0
              command:
                - sh
                - -ec
                - |
                  wal_dir=/var/loki/wal
                  marker=/var/loki/.wal-cleaned-20260719

                  if [ -e "${marker}" ]; then
                    exit 0
                  fi

                  if [ -d "${wal_dir}" ]; then
                    find "${wal_dir}" -xdev -mindepth 1 -delete
                  fi

                  touch "${marker}"
                  sync
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsGroup: 10001
                runAsNonRoot: true
                runAsUser: 10001
              volumeMounts:
                - name: storage
                  mountPath: /var/loki
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          persistence:
            size: 2Gi
        # Zero out replica counts of other deployment modes
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0

        ingester:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        distributor:
          replicas: 0
        compactor:
          replicas: 0
        indexGateway:
          replicas: 0
        bloomCompactor:
          replicas: 0
        bloomGateway:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
