apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 80.9.0
    helm:
      valuesObject:
        kubeProxy:
          enabled: false
        defaultRules:
          rules:
            kubeProxy: false
        additionalPrometheusRulesMap:
          longhorn-rules:
            groups:
              - name: longhorn.rules
                rules:
                  - alert: LonghornVolumeActualSpaceUsedWarning
                    annotations:
                      description: The actual space used by Longhorn volume {{$labels.pvc}} ({{$labels.pvc_namespace}}) on {{$labels.node}} is at {{$value}}% capacity for more than 5 minutes.
                      summary: The actual used space of Longhorn volume is over 90% of the capacity.
                    expr: (longhorn_volume_actual_size_bytes / longhorn_volume_capacity_bytes) * 100 > 90
                    for: 5m
                    labels:
                      issue: The actual used space of Longhorn volume {{$labels.pvc}} in {{$labels.pvc_namespace}} on {{$labels.node}} is high.
                      severity: warning
                  - alert: LonghornVolumeStatusCritical
                    annotations:
                      description: Longhorn volume {{$labels.volume}} on {{$labels.node}} is Fault for more than 2 minutes.
                      summary: Longhorn volume {{$labels.volume}} is Fault
                    expr: longhorn_volume_robustness == 3
                    for: 5m
                    labels:
                      issue: Longhorn volume {{$labels.volume}} is Fault.
                      severity: critical
                  - alert: LonghornVolumeStatusWarning
                    annotations:
                      description: Longhorn volume {{$labels.volume}} on {{$labels.node}} is Degraded for more than 5 minutes.
                      summary: Longhorn volume {{$labels.volume}} is Degraded
                    expr: longhorn_volume_robustness == 2
                    for: 5m
                    labels:
                      issue: Longhorn volume {{$labels.volume}} is Degraded.
                      severity: warning
                  - alert: LonghornNodeStorageWarning
                    annotations:
                      description: The used storage of node {{$labels.node}} is at {{$value}}% capacity for more than 5 minutes.
                      summary: The used storage of node is over 70% of the capacity.
                    expr: (longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes) * 100 > 70
                    for: 5m
                    labels:
                      issue: The used storage of node {{$labels.node}} is high.
                      severity: warning
                  - alert: LonghornDiskStorageWarning
                    annotations:
                      description: The used storage of disk {{$labels.disk}} on node {{$labels.node}} is at {{$value}}% capacity for more than 5 minutes.
                      summary: The used storage of disk is over 70% of the capacity.
                    expr: (longhorn_disk_usage_bytes / longhorn_disk_capacity_bytes) * 100 > 70
                    for: 5m
                    labels:
                      issue: The used storage of disk {{$labels.disk}} on node {{$labels.node}} is high.
                      severity: warning
                  - alert: LonghornNodeDown
                    annotations:
                      description: There are {{$value}} Longhorn nodes which have been offline for more than 5 minutes.
                      summary: Longhorn nodes is offline
                    expr: (avg(longhorn_node_count_total) or on() vector(0)) - (count(longhorn_node_status{condition="ready"} == 1) or on() vector(0)) > 0
                    for: 5m
                    labels:
                      issue: There are {{$value}} Longhorn nodes are offline
                      severity: critical
                  - alert: LonghornInstanceManagerCPUUsageWarning
                    annotations:
                      description: Longhorn instance manager {{$labels.instance_manager}} on {{$labels.node}} has CPU Usage / CPU request is {{$value}}% for more than 5 minutes.
                      summary: Longhorn instance manager {{$labels.instance_manager}} on {{$labels.node}} has CPU Usage / CPU request is over 300%.
                    expr: (longhorn_instance_manager_cpu_usage_millicpu/longhorn_instance_manager_cpu_requests_millicpu) * 100 > 300
                    for: 5m
                    labels:
                      issue: Longhorn instance manager {{$labels.instance_manager}} on {{$labels.node}} consumes 3 times the CPU request.
                      severity: warning
                  - alert: LonghornNodeCPUUsageWarning
                    annotations:
                      description: Longhorn node {{$labels.node}} has CPU Usage / CPU capacity is {{$value}}% for more than 5 minutes.
                      summary: Longhorn node {{$labels.node}} experiences high CPU pressure for more than 5m.
                    expr: (longhorn_node_cpu_usage_millicpu / longhorn_node_cpu_capacity_millicpu) * 100 > 90
                    for: 5m
                    labels:
                      issue: Longhorn node {{$labels.node}} experiences high CPU pressure.
                      severity: warning
        prometheusOperator:
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              memory: 100Mi
        alertmanager:
          enabled: true
          service:
            annotations:
              tailscale.com/expose: "true"
              tailscale.com/hostname: "prometheus-alertmanager"
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace', 'severity']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: 'telegram'
              routes:
                # Ne pas envoyer les alertes Watchdog (heartbeat)
                - matchers:
                    - alertname = "Watchdog"
                  receiver: 'null'
                # Alertes critiques avec répétition plus fréquente
                - matchers:
                    - severity = "critical"
                  receiver: 'telegram'
                  repeat_interval: 1h
            receivers:
              - name: 'null'
              - name: 'telegram'
                telegram_configs:
                  - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot-token
                    chat_id: 5143700048
                    parse_mode: 'HTML'
                    send_resolved: true
                    message: |
                      {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} <b>{{ .Status | toUpper }}</b>

                      {{ range .Alerts }}
                      <b>Alert:</b> {{ .Labels.alertname }}
                      <b>Severity:</b> {{ .Labels.severity }}
                      {{ if .Labels.namespace }}<b>Namespace:</b> {{ .Labels.namespace }}{{ end }}
                      {{ if .Annotations.summary }}<b>Summary:</b> {{ .Annotations.summary }}{{ end }}
                      {{ if .Annotations.description }}<b>Description:</b> {{ .Annotations.description }}{{ end }}
                      {{ end }}
          alertmanagerSpec:
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 100Mi
            secrets:
              - alertmanager-telegram
        kube-state-metrics:
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              memory: 100Mi
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 10m
              memory: 101Mi
            limits:
              memory: 101Mi
        nodeExporter:
          enabled: true
        grafana:
          resources:
            requests:
              cpu: 13m
              memory: 256Mi
            limits:
              memory: 512Mi
          deleteDatasources:
            - name: Loki
              orgId: 1
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki-gateway
              access: proxy
              isDefault: false
              jsonData:
                httpHeaderName1: "X-Scope-OrgID"
              secureJsonData:
                httpHeaderValue1: "default"
          sidecar:
            datasources:
              skipReload: false
          persistence:
            enabled: true
            type: sts
            storageClassName: "longhorn"
            accessModes:
              - ReadWriteOnce
            size: 1Gi
            finalizers:
              - kubernetes.io/pvc-protection
        prometheus:
          prometheusSpec:
            resources:
              requests:
                cpu: 200m
                memory: 1500Mi
              limits:
                memory: 1500Mi
          service:
            annotations:
              tailscale.com/expose: "true"
              tailscale.com/hostname: "prometheus"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
